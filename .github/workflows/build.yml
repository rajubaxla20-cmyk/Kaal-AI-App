
name: Build Kaal AI APK
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential git ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good openjdk-17-jdk unzip zip libsqlite3-dev sqlite3 libssl-dev libffi-dev lld autoconf automake libtool
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "buildozer==1.5.0" "cython<3.0.0" virtualenv
      - name: Build with Buildozer
        run: |
          # Automatically find the existing NDK on the GitHub runner
          AVAILABLE_NDK=$(ls -d /usr/local/lib/android/sdk/ndk/* | head -n 1)
          export ANDROID_NDK_HOME=$AVAILABLE_NDK
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export BUILDOZER_WARN_ON_ROOT=0
          
          # Force buildozer to accept licenses automatically via config
          sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec || true
          
          buildozer -v android debug
